<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Photo Report Folder Picker</title>
    <style>
      :root {
        --bg: #0b1220;
        --panel: rgba(15, 23, 42, 0.95);
        --border: rgba(148, 163, 184, 0.18);
        --text: #e5eefb;
        --text-muted: #94a3b8;
        --info: #38bdf8;
        --warn: #f59e0b;
        --danger: #fb7185;
        --success: #22c55e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 18px;
        font-family: "Google Sans", Roboto, Arial, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top, rgba(56, 189, 248, 0.16), transparent 30%),
          radial-gradient(circle at bottom right, rgba(34, 197, 94, 0.14), transparent 28%),
          linear-gradient(180deg, #09101c 0%, #101826 100%);
      }

      button {
        font: inherit;
      }

      .dialog {
        width: min(100%, 620px);
        padding: 22px;
        border: 1px solid var(--border);
        border-radius: 24px;
        background: var(--panel);
        box-shadow: 0 24px 48px rgba(2, 6, 23, 0.46);
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(56, 189, 248, 0.12);
        color: #bae6fd;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 16px 0 8px;
        font-size: 26px;
        line-height: 1.08;
      }

      p {
        margin: 0;
        color: var(--text-muted);
        line-height: 1.6;
      }

      .current-folder {
        margin-top: 16px;
        padding: 14px 16px;
        border-radius: 16px;
        border: 1px solid rgba(148, 163, 184, 0.14);
        background: rgba(255, 255, 255, 0.03);
      }

      .current-folder strong {
        display: block;
        margin-bottom: 6px;
      }

      .actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 18px;
      }

      .button {
        appearance: none;
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        font-weight: 700;
        cursor: pointer;
      }

      .button.primary {
        color: #082f49;
        background: linear-gradient(135deg, #7dd3fc 0%, #38bdf8 100%);
      }

      .button.secondary {
        color: #e2e8f0;
        background: rgba(30, 41, 59, 0.9);
        border: 1px solid rgba(148, 163, 184, 0.16);
      }

      .status {
        margin-top: 18px;
        padding: 14px 16px;
        border-radius: 16px;
        border: 1px solid rgba(148, 163, 184, 0.14);
        background: rgba(15, 23, 42, 0.74);
        line-height: 1.6;
      }

      .status.warn {
        color: #fde68a;
      }

      .status.error {
        color: #fecdd3;
      }

      .status.success {
        color: #bbf7d0;
      }
    </style>
  </head>
  <body>
    <div class="dialog">
      <div class="eyebrow">Google Picker</div>
      <h1>Select the photo folder</h1>
      <p>
        Choose the Google Drive folder that contains numbered images such as
        <code>Image 12.jpg</code>. The selected folder ID and name will be saved in the
        document properties for this report.
      </p>

      <div class="current-folder" id="current-folder">
        <strong>Current folder</strong>
        <span id="current-folder-text">No folder saved yet.</span>
      </div>

      <div class="actions">
        <button class="button primary" id="launch-picker-button" type="button">Open Drive Folder Picker</button>
        <button class="button secondary" id="close-button" type="button">Close</button>
      </div>

      <div class="status" id="status-box">
        Preparing Google Picker...
      </div>
    </div>

    <script>
      const bootstrap = <?!= bootstrapJson ?>;

      let pickerApiLoaded = false;
      let pickerScriptRequested = false;
      let oauthToken = '';

      function initializePickerDialog() {
        bindEvents();
        renderFolder();

        if (!bootstrap.picker || !bootstrap.picker.configured) {
          setStatus(
              'Google Picker credentials are not configured for this copy yet. Save your API key and Cloud project number from the sidebar first.',
              'warn',
          );
          return;
        }

        loadPickerApi(function() {
          google.script.run
              .withSuccessHandler(function(token) {
                oauthToken = token;
                openFolderPicker();
              })
              .withFailureHandler(handleFailure)
              .getOAuthToken();
        });
      }

      function bindEvents() {
        document.getElementById('launch-picker-button').addEventListener('click', function() {
          if (!bootstrap.picker || !bootstrap.picker.configured) {
            setStatus('Picker credentials are still missing. Configure them in the sidebar first.', 'warn');
            return;
          }

          loadPickerApi(function() {
            if (!oauthToken) {
              google.script.run
                  .withSuccessHandler(function(token) {
                    oauthToken = token;
                    openFolderPicker();
                  })
                  .withFailureHandler(handleFailure)
                  .getOAuthToken();
              return;
            }

            openFolderPicker();
          });
        });

        document.getElementById('close-button').addEventListener('click', function() {
          google.script.host.close();
        });
      }

      function renderFolder() {
        const folder = bootstrap.folder;
        const text = document.getElementById('current-folder-text');

        if (!folder || !folder.id) {
          text.textContent = 'No folder saved yet.';
          return;
        }

        text.textContent = folder.name + ' (' + folder.id + ')';
      }

      function loadPickerApi(callback) {
        if (pickerApiLoaded) {
          callback();
          return;
        }

        window.__photoReportPickerReady = callback;
        if (pickerScriptRequested) {
          return;
        }

        pickerScriptRequested = true;
        window.onPhotoReportPickerLoaded = function() {
          gapi.load('picker', {
            callback: function() {
              pickerApiLoaded = true;
              if (typeof window.__photoReportPickerReady === 'function') {
                const ready = window.__photoReportPickerReady;
                window.__photoReportPickerReady = null;
                ready();
              }
            },
          });
        };

        const script = document.createElement('script');
        script.src = 'https://apis.google.com/js/api.js?onload=onPhotoReportPickerLoaded';
        script.async = true;
        script.defer = true;
        script.onerror = function() {
          pickerScriptRequested = false;
          setStatus('Could not load the Google Picker API. Close this dialog and use the manual folder field in the sidebar instead.', 'error');
        };
        document.head.appendChild(script);
      }

      function openFolderPicker() {
        const picker = bootstrap.picker || {};
        if (!oauthToken || !picker.developerKey || !picker.cloudProjectNumber) {
          setStatus('Picker credentials are incomplete. Save valid credentials in the sidebar and try again.', 'error');
          return;
        }

        setStatus('Opening Google Drive folder picker...', '');

        const folderView = new google.picker.DocsView(google.picker.ViewId.FOLDERS)
            .setIncludeFolders(true)
            .setSelectFolderEnabled(true);

        const pickerInstance = new google.picker.PickerBuilder()
            .addView(folderView)
            .setOAuthToken(oauthToken)
            .setDeveloperKey(picker.developerKey)
            .setAppId(picker.cloudProjectNumber)
            .setOrigin(google.script.host.origin)
            .setCallback(function(data) {
              const action = data[google.picker.Response.ACTION];

              if (action === google.picker.Action.CANCEL) {
                setStatus('Folder selection canceled.', 'warn');
                return;
              }

              if (action !== google.picker.Action.PICKED) {
                return;
              }

              const folderData = data[google.picker.Response.DOCUMENTS][0];
              const folderId = folderData[google.picker.Document.ID];
              const folderName = folderData[google.picker.Document.NAME] || 'Selected folder';

              setStatus('Saving folder selection...', '');
              google.script.run
                  .withSuccessHandler(function() {
                    setStatus('Folder saved: ' + folderName + '. You can close this dialog and keep working in the sidebar.', 'success');
                    window.setTimeout(function() {
                      google.script.host.close();
                    }, 900);
                  })
                  .withFailureHandler(handleFailure)
                  .handlePickerResponse(folderId, folderName);
            })
            .build();

        pickerInstance.setVisible(true);
      }

      function setStatus(message, tone) {
        const box = document.getElementById('status-box');
        box.textContent = message;
        box.className = 'status' + (tone ? ' ' + tone : '');
      }

      function handleFailure(error) {
        const message = error && error.message ? error.message : String(error);
        setStatus(message, 'error');
      }

      window.addEventListener('load', initializePickerDialog);
    </script>
  </body>
</html>
